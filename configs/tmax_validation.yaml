version: 1

project:
  name: wrf_tmax_station_validation

wrf:
  input_root: data/wrfout
  schemes: auto
  scheme_name_pattern: "lw{lw}-sw{sw}"
  file_patterns:
    - "wrfout_d0*"

observed:
  data_dir: data/observed
  boundary: data/boundary/study_area.shp
  station_policy: all_in_boundary

validation:
  variable: Tmax
  start: "06-01"
  end: "10-01"

output:
  root: outputs/runs
